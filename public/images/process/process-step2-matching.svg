<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111C1A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1D2E2B;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8FD299;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6BC07A;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg2)" rx="24"/>
  <g opacity="0.04" stroke="#8FD299" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/><line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/><line x1="600" y1="0" x2="600" y2="600"/>
  </g>
  <circle cx="650" cy="120" r="180" fill="#8FD299" opacity="0.03"/>
  <circle cx="150" cy="480" r="120" fill="#8FD299" opacity="0.03"/>
  <!-- Step badge -->
  <rect x="320" y="40" width="160" height="40" rx="20" fill="rgba(143,210,153,0.15)" stroke="rgba(143,210,153,0.3)" stroke-width="1"/>
  <text x="400" y="66" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#8FD299" text-anchor="middle" letter-spacing="2">STEP 2</text>
  <!-- Main icon group - people matching -->
  <g transform="translate(400,240)" filter="url(#glow2)">
    <!-- Left person -->
    <g transform="translate(-100,0)">
      <circle cx="0" cy="-30" r="22" fill="rgba(143,210,153,0.08)" stroke="rgba(143,210,153,0.5)" stroke-width="1.5"/>
      <circle cx="0" cy="-35" r="10" fill="none" stroke="#8FD299" stroke-width="1.5"/>
      <path d="M-15,-15 Q-15,-5 0,-5 Q15,-5 15,-15" fill="none" stroke="#8FD299" stroke-width="1.5"/>
      <!-- Skill tags -->
      <rect x="-30" y="10" width="60" height="18" rx="9" fill="rgba(143,210,153,0.12)" stroke="rgba(143,210,153,0.25)" stroke-width="0.8"/>
      <text x="0" y="23" font-family="system-ui,sans-serif" font-size="9" fill="rgba(143,210,153,0.7)" text-anchor="middle">React · Node</text>
      <rect x="-25" y="35" width="50" height="18" rx="9" fill="rgba(143,210,153,0.08)" stroke="rgba(143,210,153,0.2)" stroke-width="0.8"/>
      <text x="0" y="48" font-family="system-ui,sans-serif" font-size="9" fill="rgba(143,210,153,0.5)" text-anchor="middle">5 yrs exp</text>
    </g>
    <!-- Center match icon -->
    <g>
      <circle cx="0" cy="0" r="30" fill="rgba(143,210,153,0.1)" stroke="url(#accent2)" stroke-width="2"/>
      <!-- Checkmark -->
      <polyline points="-10,0 -3,8 12,-8" fill="none" stroke="#8FD299" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Connection lines -->
      <line x1="-65" y1="-10" x2="-35" y2="-3" stroke="rgba(143,210,153,0.3)" stroke-width="1" stroke-dasharray="4,3"/>
      <line x1="65" y1="-10" x2="35" y2="-3" stroke="rgba(143,210,153,0.3)" stroke-width="1" stroke-dasharray="4,3"/>
    </g>
    <!-- Right person -->
    <g transform="translate(100,0)">
      <circle cx="0" cy="-30" r="22" fill="rgba(143,210,153,0.08)" stroke="rgba(143,210,153,0.5)" stroke-width="1.5"/>
      <circle cx="0" cy="-35" r="10" fill="none" stroke="#8FD299" stroke-width="1.5"/>
      <path d="M-15,-15 Q-15,-5 0,-5 Q15,-5 15,-15" fill="none" stroke="#8FD299" stroke-width="1.5"/>
      <rect x="-30" y="10" width="60" height="18" rx="9" fill="rgba(143,210,153,0.12)" stroke="rgba(143,210,153,0.25)" stroke-width="0.8"/>
      <text x="0" y="23" font-family="system-ui,sans-serif" font-size="9" fill="rgba(143,210,153,0.7)" text-anchor="middle">Python · AI</text>
      <rect x="-25" y="35" width="50" height="18" rx="9" fill="rgba(143,210,153,0.08)" stroke="rgba(143,210,153,0.2)" stroke-width="0.8"/>
      <text x="0" y="48" font-family="system-ui,sans-serif" font-size="9" fill="rgba(143,210,153,0.5)" text-anchor="middle">7 yrs exp</text>
    </g>
    <!-- Third person below -->
    <g transform="translate(0,85)">
      <circle cx="0" cy="-30" r="22" fill="rgba(143,210,153,0.08)" stroke="rgba(143,210,153,0.5)" stroke-width="1.5"/>
      <circle cx="0" cy="-35" r="10" fill="none" stroke="#8FD299" stroke-width="1.5"/>
      <path d="M-15,-15 Q-15,-5 0,-5 Q15,-5 15,-15" fill="none" stroke="#8FD299" stroke-width="1.5"/>
      <rect x="-30" y="10" width="60" height="18" rx="9" fill="rgba(143,210,153,0.12)" stroke="rgba(143,210,153,0.25)" stroke-width="0.8"/>
      <text x="0" y="23" font-family="system-ui,sans-serif" font-size="9" fill="rgba(143,210,153,0.7)" text-anchor="middle">DevOps · AWS</text>
      <line x1="0" y1="-55" x2="0" y2="-65" stroke="rgba(143,210,153,0.3)" stroke-width="1" stroke-dasharray="4,3"/>
    </g>
    <!-- 48 hour badge -->
    <rect x="-45" y="-95" width="90" height="32" rx="16" fill="rgba(143,210,153,0.15)" stroke="rgba(143,210,153,0.4)" stroke-width="1"/>
    <text x="0" y="-74" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#8FD299" text-anchor="middle">48 HOURS</text>
  </g>
  <!-- Title -->
  <text x="400" y="440" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle">Get Matched in 48 Hours</text>
  <text x="400" y="475" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="rgba(255,255,255,0.55)" text-anchor="middle">Receive 3 pre-vetted, AI-trained candidate profiles</text>
  <!-- Decorative dots -->
  <g opacity="0.15" fill="#8FD299">
    <circle cx="100" cy="100" r="2"/><circle cx="120" cy="100" r="2"/><circle cx="140" cy="100" r="2"/>
    <circle cx="100" cy="120" r="2"/><circle cx="120" cy="120" r="2"/><circle cx="140" cy="120" r="2"/>
    <circle cx="660" cy="480" r="2"/><circle cx="680" cy="480" r="2"/><circle cx="700" cy="480" r="2"/>
    <circle cx="660" cy="500" r="2"/><circle cx="680" cy="500" r="2"/><circle cx="700" cy="500" r="2"/>
  </g>
</svg>