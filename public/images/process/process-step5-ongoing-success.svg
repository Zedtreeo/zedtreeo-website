<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg5s" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111C1A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1D2E2B;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow5s"><feGaussianBlur stdDeviation="10" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg5s)" rx="24"/>
  <g opacity="0.04" stroke="#8FD299" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/><line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/><line x1="600" y1="0" x2="600" y2="600"/>
  </g>
  <circle cx="650" cy="120" r="180" fill="#8FD299" opacity="0.03"/>
  <circle cx="150" cy="480" r="120" fill="#8FD299" opacity="0.03"/>
  <!-- Step badge -->
  <rect x="320" y="40" width="160" height="40" rx="20" fill="rgba(143,210,153,0.15)" stroke="rgba(143,210,153,0.3)" stroke-width="1"/>
  <text x="400" y="66" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#8FD299" text-anchor="middle" letter-spacing="2">STEP 5</text>
  <!-- Dashboard + growth chart -->
  <g transform="translate(400,245)" filter="url(#glow5s)">
    <!-- Main dashboard frame -->
    <rect x="-130" y="-95" width="260" height="190" rx="12" fill="rgba(143,210,153,0.04)" stroke="rgba(143,210,153,0.2)" stroke-width="1.5"/>
    <!-- Top bar -->
    <rect x="-130" y="-95" width="260" height="28" rx="12" fill="rgba(143,210,153,0.06)"/>
    <rect x="-130" y="-79" width="260" height="12" fill="rgba(143,210,153,0.06)"/>
    <text x="0" y="-78" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="rgba(143,210,153,0.5)" text-anchor="middle">Weekly KPI Report</text>
    <!-- KPI row -->
    <g transform="translate(0,-45)">
      <rect x="-115" y="-12" width="70" height="38" rx="6" fill="rgba(143,210,153,0.06)" stroke="rgba(143,210,153,0.12)" stroke-width="0.6"/>
      <text x="-80" y="2" font-family="system-ui,sans-serif" font-size="7" fill="rgba(143,210,153,0.45)" text-anchor="middle">TASKS</text>
      <text x="-80" y="17" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#8FD299" text-anchor="middle">98%</text>
      <rect x="-35" y="-12" width="70" height="38" rx="6" fill="rgba(143,210,153,0.06)" stroke="rgba(143,210,153,0.12)" stroke-width="0.6"/>
      <text x="0" y="2" font-family="system-ui,sans-serif" font-size="7" fill="rgba(143,210,153,0.45)" text-anchor="middle">QUALITY</text>
      <text x="0" y="17" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#8FD299" text-anchor="middle">4.9/5</text>
      <rect x="45" y="-12" width="70" height="38" rx="6" fill="rgba(143,210,153,0.06)" stroke="rgba(143,210,153,0.12)" stroke-width="0.6"/>
      <text x="80" y="2" font-family="system-ui,sans-serif" font-size="7" fill="rgba(143,210,153,0.45)" text-anchor="middle">HOURS</text>
      <text x="80" y="17" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#8FD299" text-anchor="middle">40/wk</text>
    </g>
    <!-- Growth chart -->
    <g transform="translate(0,25)">
      <path d="M-110,40 L-110,20 L-75,15 L-40,5 L-5,-5 L30,-15 L65,-20 L100,-35 L100,40 Z" fill="rgba(143,210,153,0.06)"/>
      <polyline points="-110,20 -75,15 -40,5 -5,-5 30,-15 65,-20 100,-35" fill="none" stroke="#8FD299" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="100" cy="-35" r="4" fill="#8FD299"/>
      <!-- Upward arrow -->
      <g transform="translate(108,-40)">
        <polyline points="-4,4 0,-4 4,4" fill="none" stroke="#8FD299" stroke-width="1.5" stroke-linecap="round"/>
      </g>
      <line x1="-115" y1="40" x2="115" y2="40" stroke="rgba(143,210,153,0.12)" stroke-width="0.6"/>
    </g>
    <!-- Support & guarantee badges -->
    <g transform="translate(-55,100)">
      <rect x="0" y="0" width="110" height="26" rx="13" fill="rgba(143,210,153,0.12)" stroke="rgba(143,210,153,0.3)" stroke-width="0.8"/>
      <text x="55" y="17" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#8FD299" text-anchor="middle">Dedicated Support</text>
    </g>
    <!-- Shield/guarantee icon -->
    <g transform="translate(145,-30)">
      <path d="M0,-22 L18,-14 L18,6 Q18,18 0,25 Q-18,18 -18,6 L-18,-14 Z" fill="rgba(143,210,153,0.08)" stroke="rgba(143,210,153,0.3)" stroke-width="1"/>
      <polyline points="-6,0 -2,6 8,-6" fill="none" stroke="#8FD299" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="0" y="38" font-family="system-ui,sans-serif" font-size="7" fill="rgba(143,210,153,0.5)" text-anchor="middle">GUARANTEE</text>
    </g>
    <!-- Infinity / forever replacement -->
    <g transform="translate(145,30)">
      <path d="M-12,0 C-12,-8 -4,-12 0,-6 C4,-12 12,-8 12,0 C12,8 4,12 0,6 C-4,12 -12,8 -12,0 Z" fill="none" stroke="#8FD299" stroke-width="1.5" opacity="0.5"/>
      <text x="0" y="18" font-family="system-ui,sans-serif" font-size="7" fill="rgba(143,210,153,0.5)" text-anchor="middle">FREE REPLACE</text>
    </g>
  </g>
  <!-- Title -->
  <text x="400" y="445" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle">Ongoing Success</text>
  <text x="400" y="480" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="rgba(255,255,255,0.55)" text-anchor="middle">Weekly KPI reports, dedicated support &amp; free replacement guarantee</text>
  <!-- Decorative dots -->
  <g opacity="0.15" fill="#8FD299">
    <circle cx="100" cy="100" r="2"/><circle cx="120" cy="100" r="2"/><circle cx="140" cy="100" r="2"/>
    <circle cx="100" cy="120" r="2"/><circle cx="120" cy="120" r="2"/><circle cx="140" cy="120" r="2"/>
    <circle cx="660" cy="480" r="2"/><circle cx="680" cy="480" r="2"/><circle cx="700" cy="480" r="2"/>
    <circle cx="660" cy="500" r="2"/><circle cx="680" cy="500" r="2"/><circle cx="700" cy="500" r="2"/>
  </g>
</svg>