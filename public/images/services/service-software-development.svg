<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bgsd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111C1A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1D2E2B;stop-opacity:1"/>
    </linearGradient>
    <filter id="glowsd"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="600" fill="url(#bgsd)" rx="24"/>
  <g opacity="0.04" stroke="#8FD299" stroke-width="0.5">
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/><line x1="600" y1="0" x2="600" y2="600"/>
  </g>
  <circle cx="680" cy="100" r="200" fill="#8FD299" opacity="0.025"/>
  <!-- Service badge -->
  <rect x="270" y="40" width="260" height="40" rx="20" fill="rgba(143,210,153,0.15)" stroke="rgba(143,210,153,0.3)" stroke-width="1"/>
  <text x="400" y="66" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#8FD299" text-anchor="middle" letter-spacing="1.5">SOFTWARE DEVELOPMENT</text>
  <!-- Code editor mockup -->
  <g transform="translate(400,250)" filter="url(#glowsd)">
    <!-- Editor window -->
    <rect x="-130" y="-100" width="260" height="200" rx="12" fill="rgba(143,210,153,0.04)" stroke="rgba(143,210,153,0.25)" stroke-width="1.5"/>
    <!-- Title bar -->
    <rect x="-130" y="-100" width="260" height="28" rx="12" fill="rgba(143,210,153,0.08)"/>
    <rect x="-130" y="-84" width="260" height="12" fill="rgba(143,210,153,0.08)"/>
    <!-- Window dots -->
    <circle cx="-112" cy="-86" r="4" fill="rgba(255,100,100,0.4)"/><circle cx="-98" cy="-86" r="4" fill="rgba(255,200,50,0.4)"/><circle cx="-84" cy="-86" r="4" fill="rgba(143,210,153,0.4)"/>
    <!-- Code lines -->
    <text x="-110" y="-55" font-family="monospace" font-size="11" fill="rgba(143,210,153,0.7)">const</text>
    <text x="-72" y="-55" font-family="monospace" font-size="11" fill="#8FD299">hire</text>
    <text x="-42" y="-55" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.3)">=</text>
    <text x="-30" y="-55" font-family="monospace" font-size="11" fill="rgba(143,210,153,0.5)">async</text>
    <text x="10" y="-55" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.3)">()</text>
    <text x="25" y="-55" font-family="monospace" font-size="11" fill="rgba(143,210,153,0.5)">=&gt;</text>
    <text x="48" y="-55" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.25)">&#123;</text>
    <rect x="-95" y="-40" width="140" height="3" rx="1.5" fill="rgba(143,210,153,0.15)"/>
    <rect x="-95" y="-28" width="100" height="3" rx="1.5" fill="rgba(143,210,153,0.1)"/>
    <rect x="-95" y="-16" width="160" height="3" rx="1.5" fill="rgba(143,210,153,0.12)"/>
    <rect x="-95" y="-4" width="120" height="3" rx="1.5" fill="rgba(143,210,153,0.08)"/>
    <rect x="-95" y="8" width="90" height="3" rx="1.5" fill="rgba(143,210,153,0.15)"/>
    <rect x="-95" y="20" width="145" height="3" rx="1.5" fill="rgba(143,210,153,0.1)"/>
    <rect x="-95" y="32" width="80" height="3" rx="1.5" fill="rgba(143,210,153,0.12)"/>
    <!-- Cursor blink -->
    <rect x="-95" y="44" width="2" height="14" fill="#8FD299" opacity="0.8"/>
    <!-- Floating tech badges -->
    <g transform="translate(155,-60)">
      <rect x="0" y="0" width="50" height="22" rx="11" fill="rgba(143,210,153,0.12)" stroke="rgba(143,210,153,0.25)" stroke-width="0.8"/>
      <text x="25" y="15" font-family="system-ui,sans-serif" font-size="9" fill="rgba(143,210,153,0.7)" text-anchor="middle">React</text>
    </g>
    <g transform="translate(155,-25)">
      <rect x="0" y="0" width="55" height="22" rx="11" fill="rgba(143,210,153,0.12)" stroke="rgba(143,210,153,0.25)" stroke-width="0.8"/>
      <text x="27" y="15" font-family="system-ui,sans-serif" font-size="9" fill="rgba(143,210,153,0.7)" text-anchor="middle">Python</text>
    </g>
    <g transform="translate(155,10)">
      <rect x="0" y="0" width="42" height="22" rx="11" fill="rgba(143,210,153,0.12)" stroke="rgba(143,210,153,0.25)" stroke-width="0.8"/>
      <text x="21" y="15" font-family="system-ui,sans-serif" font-size="9" fill="rgba(143,210,153,0.7)" text-anchor="middle">AI/ML</text>
    </g>
    <g transform="translate(155,45)">
      <rect x="0" y="0" width="45" height="22" rx="11" fill="rgba(143,210,153,0.12)" stroke="rgba(143,210,153,0.25)" stroke-width="0.8"/>
      <text x="22" y="15" font-family="system-ui,sans-serif" font-size="9" fill="rgba(143,210,153,0.7)" text-anchor="middle">AWS</text>
    </g>
  </g>
  <!-- Title -->
  <text x="400" y="440" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle">Software Development</text>
  <text x="400" y="475" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="rgba(255,255,255,0.55)" text-anchor="middle">Full-stack developers, AI engineers, DevOps &amp; QA specialists</text>
  <g opacity="0.15" fill="#8FD299">
    <circle cx="100" cy="100" r="2"/><circle cx="120" cy="100" r="2"/><circle cx="140" cy="100" r="2"/>
    <circle cx="100" cy="120" r="2"/><circle cx="120" cy="120" r="2"/><circle cx="140" cy="120" r="2"/>
  </g>
</svg>