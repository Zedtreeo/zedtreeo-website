<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bglo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111C1A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1D2E2B;stop-opacity:1"/>
    </linearGradient>
    <filter id="glowlo"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="600" fill="url(#bglo)" rx="24"/>
  <g opacity="0.04" stroke="#8FD299" stroke-width="0.5">
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/><line x1="600" y1="0" x2="600" y2="600"/>
  </g>
  <circle cx="680" cy="100" r="200" fill="#8FD299" opacity="0.025"/>
  <rect x="260" y="40" width="280" height="40" rx="20" fill="rgba(143,210,153,0.15)" stroke="rgba(143,210,153,0.3)" stroke-width="1"/>
  <text x="400" y="66" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#8FD299" text-anchor="middle" letter-spacing="1.5">LOGISTICS &amp; OPERATIONS</text>
  <!-- Supply chain / truck + warehouse -->
  <g transform="translate(400,240)" filter="url(#glowlo)">
    <!-- Warehouse -->
    <g transform="translate(-85,-15)">
      <rect x="-50" y="-50" width="100" height="80" rx="4" fill="rgba(143,210,153,0.05)" stroke="rgba(143,210,153,0.2)" stroke-width="1.5"/>
      <!-- Roof -->
      <path d="M-55,-50 L0,-75 L55,-50" fill="rgba(143,210,153,0.06)" stroke="rgba(143,210,153,0.25)" stroke-width="1.2"/>
      <!-- Shelves -->
      <line x1="-35" y1="-25" x2="35" y2="-25" stroke="rgba(143,210,153,0.15)" stroke-width="0.8"/>
      <line x1="-35" y1="-5" x2="35" y2="-5" stroke="rgba(143,210,153,0.15)" stroke-width="0.8"/>
      <line x1="-35" y1="15" x2="35" y2="15" stroke="rgba(143,210,153,0.15)" stroke-width="0.8"/>
      <!-- Boxes on shelves -->
      <rect x="-30" y="-40" width="14" height="14" rx="2" fill="rgba(143,210,153,0.1)" stroke="rgba(143,210,153,0.2)" stroke-width="0.6"/>
      <rect x="-12" y="-40" width="14" height="14" rx="2" fill="rgba(143,210,153,0.08)" stroke="rgba(143,210,153,0.15)" stroke-width="0.6"/>
      <rect x="10" y="-40" width="14" height="14" rx="2" fill="rgba(143,210,153,0.12)" stroke="rgba(143,210,153,0.2)" stroke-width="0.6"/>
      <rect x="-25" y="-20" width="14" height="14" rx="2" fill="rgba(143,210,153,0.08)" stroke="rgba(143,210,153,0.15)" stroke-width="0.6"/>
      <rect x="-5" y="-20" width="14" height="14" rx="2" fill="rgba(143,210,153,0.1)" stroke="rgba(143,210,153,0.18)" stroke-width="0.6"/>
      <rect x="15" y="-20" width="14" height="14" rx="2" fill="rgba(143,210,153,0.06)" stroke="rgba(143,210,153,0.12)" stroke-width="0.6"/>
    </g>
    <!-- Arrow flow -->
    <g transform="translate(0,0)">
      <line x1="-25" y1="-10" x2="25" y2="-10" stroke="rgba(143,210,153,0.3)" stroke-width="1.5" stroke-dasharray="5,4"/>
      <polygon points="25,-15 35,-10 25,-5" fill="rgba(143,210,153,0.4)"/>
    </g>
    <!-- Delivery truck -->
    <g transform="translate(85,-15)">
      <rect x="-35" y="-30" width="50" height="40" rx="4" fill="rgba(143,210,153,0.06)" stroke="rgba(143,210,153,0.25)" stroke-width="1.5"/>
      <!-- Cab -->
      <rect x="15" y="-15" width="25" height="25" rx="4" fill="rgba(143,210,153,0.08)" stroke="rgba(143,210,153,0.25)" stroke-width="1.5"/>
      <!-- Windshield -->
      <rect x="19" y="-10" width="17" height="10" rx="2" fill="rgba(143,210,153,0.12)" stroke="rgba(143,210,153,0.2)" stroke-width="0.6"/>
      <!-- Wheels -->
      <circle cx="-20" cy="14" r="8" fill="rgba(143,210,153,0.08)" stroke="rgba(143,210,153,0.3)" stroke-width="1.5"/>
      <circle cx="-20" cy="14" r="3" fill="rgba(143,210,153,0.15)"/>
      <circle cx="27" cy="14" r="8" fill="rgba(143,210,153,0.08)" stroke="rgba(143,210,153,0.3)" stroke-width="1.5"/>
      <circle cx="27" cy="14" r="3" fill="rgba(143,210,153,0.15)"/>
      <!-- Package icon on truck -->
      <rect x="-20" y="-20" width="18" height="18" rx="2" fill="rgba(143,210,153,0.1)" stroke="rgba(143,210,153,0.3)" stroke-width="0.8"/>
      <line x1="-11" y1="-20" x2="-11" y2="-2" stroke="rgba(143,210,153,0.2)" stroke-width="0.5"/>
      <line x1="-20" y1="-11" x2="-2" y2="-11" stroke="rgba(143,210,153,0.2)" stroke-width="0.5"/>
    </g>
    <!-- Tracking status bar -->
    <g transform="translate(0,60)">
      <rect x="-100" y="0" width="200" height="28" rx="14" fill="rgba(143,210,153,0.08)" stroke="rgba(143,210,153,0.2)" stroke-width="1"/>
      <circle cx="-70" cy="14" r="5" fill="#8FD299" opacity="0.6"/>
      <circle cx="-30" cy="14" r="5" fill="#8FD299" opacity="0.6"/>
      <circle cx="10" cy="14" r="5" fill="#8FD299" opacity="0.6"/>
      <circle cx="50" cy="14" r="5" fill="rgba(143,210,153,0.2)" stroke="rgba(143,210,153,0.4)" stroke-width="1"/>
      <line x1="-65" y1="14" x2="-35" y2="14" stroke="rgba(143,210,153,0.3)" stroke-width="1.5"/>
      <line x1="-25" y1="14" x2="5" y2="14" stroke="rgba(143,210,153,0.3)" stroke-width="1.5"/>
      <line x1="15" y1="14" x2="45" y2="14" stroke="rgba(143,210,153,0.15)" stroke-width="1.5" stroke-dasharray="3,3"/>
      <text x="78" y="18" font-family="system-ui,sans-serif" font-size="8" fill="rgba(143,210,153,0.5)">75%</text>
    </g>
    <!-- Tool badges -->
    <g transform="translate(150,-50)">
      <rect x="0" y="0" width="52" height="22" rx="11" fill="rgba(143,210,153,0.12)" stroke="rgba(143,210,153,0.25)" stroke-width="0.8"/>
      <text x="26" y="15" font-family="system-ui,sans-serif" font-size="9" fill="rgba(143,210,153,0.7)" text-anchor="middle">SAP</text>
    </g>
    <g transform="translate(150,-18)">
      <rect x="0" y="0" width="52" height="22" rx="11" fill="rgba(143,210,153,0.12)" stroke="rgba(143,210,153,0.25)" stroke-width="0.8"/>
      <text x="26" y="15" font-family="system-ui,sans-serif" font-size="9" fill="rgba(143,210,153,0.7)" text-anchor="middle">Oracle</text>
    </g>
    <g transform="translate(150,14)">
      <rect x="0" y="0" width="52" height="22" rx="11" fill="rgba(143,210,153,0.12)" stroke="rgba(143,210,153,0.25)" stroke-width="0.8"/>
      <text x="26" y="15" font-family="system-ui,sans-serif" font-size="9" fill="rgba(143,210,153,0.7)" text-anchor="middle">NetSuite</text>
    </g>
  </g>
  <text x="400" y="440" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle">Logistics &amp; Operations</text>
  <text x="400" y="475" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="rgba(255,255,255,0.55)" text-anchor="middle">Operations coordinators, inventory &amp; supply chain support</text>
  <g opacity="0.15" fill="#8FD299"><circle cx="100" cy="100" r="2"/><circle cx="120" cy="100" r="2"/><circle cx="140" cy="100" r="2"/><circle cx="100" cy="120" r="2"/><circle cx="120" cy="120" r="2"/><circle cx="140" cy="120" r="2"/></g>
</svg>