<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bghc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111C1A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1D2E2B;stop-opacity:1"/>
    </linearGradient>
    <filter id="glowhc"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="600" fill="url(#bghc)" rx="24"/>
  <g opacity="0.04" stroke="#8FD299" stroke-width="0.5">
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/><line x1="600" y1="0" x2="600" y2="600"/>
  </g>
  <circle cx="680" cy="100" r="200" fill="#8FD299" opacity="0.025"/>
  <rect x="310" y="40" width="180" height="40" rx="20" fill="rgba(143,210,153,0.15)" stroke="rgba(143,210,153,0.3)" stroke-width="1"/>
  <text x="400" y="66" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#8FD299" text-anchor="middle" letter-spacing="1.5">HEALTHCARE</text>
  <!-- Healthcare icon -->
  <g transform="translate(400,240)" filter="url(#glowhc)">
    <!-- Shield with cross -->
    <path d="M0,-95 L70,-70 L70,15 Q70,65 0,90 Q-70,65 -70,15 L-70,-70 Z" fill="rgba(143,210,153,0.04)" stroke="rgba(143,210,153,0.2)" stroke-width="1.5"/>
    <!-- Inner shield -->
    <path d="M0,-75 L50,-55 L50,10 Q50,48 0,68 Q-50,48 -50,10 L-50,-55 Z" fill="rgba(143,210,153,0.06)" stroke="rgba(143,210,153,0.15)" stroke-width="1"/>
    <!-- Medical cross -->
    <rect x="-12" y="-45" width="24" height="60" rx="4" fill="rgba(143,210,153,0.2)" stroke="#8FD299" stroke-width="1.5"/>
    <rect x="-30" y="-27" width="60" height="24" rx="4" fill="rgba(143,210,153,0.2)" stroke="#8FD299" stroke-width="1.5"/>
    <!-- Heartbeat line -->
    <polyline points="-55,40 -35,40 -25,25 -15,55 -5,30 5,40 55,40" fill="none" stroke="#8FD299" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    <!-- HIPAA badge -->
    <rect x="-35" y="75" width="70" height="26" rx="13" fill="rgba(143,210,153,0.15)" stroke="rgba(143,210,153,0.4)" stroke-width="1"/>
    <text x="0" y="93" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#8FD299" text-anchor="middle">HIPAA</text>
    <!-- Tool badges -->
    <g transform="translate(100,-50)">
      <rect x="0" y="0" width="52" height="22" rx="11" fill="rgba(143,210,153,0.12)" stroke="rgba(143,210,153,0.25)" stroke-width="0.8"/>
      <text x="26" y="15" font-family="system-ui,sans-serif" font-size="9" fill="rgba(143,210,153,0.7)" text-anchor="middle">EHR</text>
    </g>
    <g transform="translate(100,-18)">
      <rect x="0" y="0" width="72" height="22" rx="11" fill="rgba(143,210,153,0.12)" stroke="rgba(143,210,153,0.25)" stroke-width="0.8"/>
      <text x="36" y="15" font-family="system-ui,sans-serif" font-size="9" fill="rgba(143,210,153,0.7)" text-anchor="middle">Telehealth</text>
    </g>
    <g transform="translate(100,14)">
      <rect x="0" y="0" width="58" height="22" rx="11" fill="rgba(143,210,153,0.12)" stroke="rgba(143,210,153,0.25)" stroke-width="0.8"/>
      <text x="29" y="15" font-family="system-ui,sans-serif" font-size="9" fill="rgba(143,210,153,0.7)" text-anchor="middle">Billing</text>
    </g>
  </g>
  <text x="400" y="445" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle">Healthcare</text>
  <text x="400" y="480" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="rgba(255,255,255,0.55)" text-anchor="middle">HIPAA-compliant VAs, medical billing &amp; telehealth support</text>
  <g opacity="0.15" fill="#8FD299"><circle cx="100" cy="100" r="2"/><circle cx="120" cy="100" r="2"/><circle cx="140" cy="100" r="2"/><circle cx="100" cy="120" r="2"/><circle cx="120" cy="120" r="2"/><circle cx="140" cy="120" r="2"/></g>
</svg>