<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bgmk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111C1A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1D2E2B;stop-opacity:1"/>
    </linearGradient>
    <filter id="glowmk"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="600" fill="url(#bgmk)" rx="24"/>
  <g opacity="0.04" stroke="#8FD299" stroke-width="0.5">
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/><line x1="600" y1="0" x2="600" y2="600"/>
  </g>
  <circle cx="680" cy="100" r="200" fill="#8FD299" opacity="0.025"/>
  <rect x="310" y="40" width="180" height="40" rx="20" fill="rgba(143,210,153,0.15)" stroke="rgba(143,210,153,0.3)" stroke-width="1"/>
  <text x="400" y="66" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#8FD299" text-anchor="middle" letter-spacing="1.5">MARKETING</text>
  <!-- Marketing dashboard mockup -->
  <g transform="translate(400,240)" filter="url(#glowmk)">
    <!-- Dashboard frame -->
    <rect x="-140" y="-95" width="280" height="195" rx="12" fill="rgba(143,210,153,0.04)" stroke="rgba(143,210,153,0.2)" stroke-width="1.5"/>
    <!-- Top bar -->
    <rect x="-140" y="-95" width="280" height="30" rx="12" fill="rgba(143,210,153,0.06)"/>
    <rect x="-140" y="-77" width="280" height="12" fill="rgba(143,210,153,0.06)"/>
    <circle cx="-122" cy="-80" r="4" fill="rgba(255,100,100,0.4)"/>
    <circle cx="-108" cy="-80" r="4" fill="rgba(255,200,50,0.4)"/>
    <circle cx="-94" cy="-80" r="4" fill="rgba(143,210,153,0.4)"/>
    <!-- KPI cards row -->
    <g transform="translate(0,-45)">
      <!-- Traffic card -->
      <rect x="-125" y="-12" width="75" height="40" rx="6" fill="rgba(143,210,153,0.06)" stroke="rgba(143,210,153,0.15)" stroke-width="0.8"/>
      <text x="-88" y="2" font-family="system-ui,sans-serif" font-size="8" fill="rgba(143,210,153,0.5)" text-anchor="middle">TRAFFIC</text>
      <text x="-88" y="18" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#8FD299" text-anchor="middle">+140%</text>
      <!-- Leads card -->
      <rect x="-38" y="-12" width="75" height="40" rx="6" fill="rgba(143,210,153,0.06)" stroke="rgba(143,210,153,0.15)" stroke-width="0.8"/>
      <text x="0" y="2" font-family="system-ui,sans-serif" font-size="8" fill="rgba(143,210,153,0.5)" text-anchor="middle">LEADS</text>
      <text x="0" y="18" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#8FD299" text-anchor="middle">+85%</text>
      <!-- ROI card -->
      <rect x="50" y="-12" width="75" height="40" rx="6" fill="rgba(143,210,153,0.06)" stroke="rgba(143,210,153,0.15)" stroke-width="0.8"/>
      <text x="88" y="2" font-family="system-ui,sans-serif" font-size="8" fill="rgba(143,210,153,0.5)" text-anchor="middle">ROI</text>
      <text x="88" y="18" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#8FD299" text-anchor="middle">4.2x</text>
    </g>
    <!-- Line chart area -->
    <g transform="translate(0,30)">
      <!-- Chart area fill -->
      <path d="M-120,35 L-120,20 L-80,10 L-40,-5 L0,-15 L40,-10 L80,-25 L120,-35 L120,35 Z" fill="rgba(143,210,153,0.06)"/>
      <!-- Chart line -->
      <polyline points="-120,20 -80,10 -40,-5 0,-15 40,-10 80,-25 120,-35" fill="none" stroke="#8FD299" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Data points -->
      <circle cx="-120" cy="20" r="3" fill="#111C1A" stroke="#8FD299" stroke-width="1.5"/>
      <circle cx="-80" cy="10" r="3" fill="#111C1A" stroke="#8FD299" stroke-width="1.5"/>
      <circle cx="-40" cy="-5" r="3" fill="#111C1A" stroke="#8FD299" stroke-width="1.5"/>
      <circle cx="0" cy="-15" r="3" fill="#111C1A" stroke="#8FD299" stroke-width="1.5"/>
      <circle cx="40" cy="-10" r="3" fill="#111C1A" stroke="#8FD299" stroke-width="1.5"/>
      <circle cx="80" cy="-25" r="3" fill="#111C1A" stroke="#8FD299" stroke-width="1.5"/>
      <circle cx="120" cy="-35" r="4" fill="#8FD299"/>
      <!-- X axis -->
      <line x1="-125" y1="35" x2="125" y2="35" stroke="rgba(143,210,153,0.15)" stroke-width="0.8"/>
    </g>
    <!-- Tool badges outside -->
    <g transform="translate(160,-40)">
      <rect x="0" y="0" width="58" height="22" rx="11" fill="rgba(143,210,153,0.12)" stroke="rgba(143,210,153,0.25)" stroke-width="0.8"/>
      <text x="29" y="15" font-family="system-ui,sans-serif" font-size="9" fill="rgba(143,210,153,0.7)" text-anchor="middle">Ahrefs</text>
    </g>
    <g transform="translate(160,-8)">
      <rect x="0" y="0" width="72" height="22" rx="11" fill="rgba(143,210,153,0.12)" stroke="rgba(143,210,153,0.25)" stroke-width="0.8"/>
      <text x="36" y="15" font-family="system-ui,sans-serif" font-size="9" fill="rgba(143,210,153,0.7)" text-anchor="middle">Surfer SEO</text>
    </g>
    <g transform="translate(160,24)">
      <rect x="0" y="0" width="65" height="22" rx="11" fill="rgba(143,210,153,0.12)" stroke="rgba(143,210,153,0.25)" stroke-width="0.8"/>
      <text x="32" y="15" font-family="system-ui,sans-serif" font-size="9" fill="rgba(143,210,153,0.7)" text-anchor="middle">HubSpot</text>
    </g>
  </g>
  <text x="400" y="445" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle">Digital Marketing</text>
  <text x="400" y="480" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="rgba(255,255,255,0.55)" text-anchor="middle">SEO specialists, content writers, PPC &amp; social media managers</text>
  <g opacity="0.15" fill="#8FD299"><circle cx="100" cy="100" r="2"/><circle cx="120" cy="100" r="2"/><circle cx="140" cy="100" r="2"/><circle cx="100" cy="120" r="2"/><circle cx="120" cy="120" r="2"/><circle cx="140" cy="120" r="2"/></g>
</svg>