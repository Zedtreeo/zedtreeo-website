      <circle cx="0" cy="0" r="26" fill="rgba(143,210,153,0.06)" stroke="rgba(143,210,153,0.2)" stroke-width="1"/>
      <rect x="-14" y="-10" width="22" height="16" rx="6" fill="none" stroke="#8FD299" stroke-width="1.2"/>
      <polygon points="-8,6 -4,6 -10,12" fill="none" stroke="#8FD299" stroke-width="1.2" stroke-linejoin="round"/>
      <circle cx="-8" cy="-2" r="1.5" fill="#8FD299" opacity="0.5"/>
      <circle cx="-3" cy="-2" r="1.5" fill="#8FD299" opacity="0.5"/>
      <circle cx="2" cy="-2" r="1.5" fill="#8FD299" opacity="0.5"/>
      <line x1="50" y1="-15" x2="30" y2="-5" stroke="rgba(143,210,153,0.15)" stroke-width="1" stroke-dasharray="3,3"/>
    </g>
    <!-- Tool badges -->
    <g transform="translate(0,100)">
      <rect x="-90" y="0" width="52" height="22" rx="11" fill="rgba(143,210,153,0.12)" stroke="rgba(143,210,153,0.25)" stroke-width="0.8"/>
      <text x="-64" y="15" font-family="system-ui,sans-serif" font-size="9" fill="rgba(143,210,153,0.7)" text-anchor="middle">Notion</text>
      <rect x="-30" y="0" width="60" height="22" rx="11" fill="rgba(143,210,153,0.12)" stroke="rgba(143,210,153,0.25)" stroke-width="0.8"/>
      <text x="0" y="15" font-family="system-ui,sans-serif" font-size="9" fill="rgba(143,210,153,0.7)" text-anchor="middle">Slack</text>
      <rect x="38" y="0" width="52" height="22" rx="11" fill="rgba(143,210,153,0.12)" stroke="rgba(143,210,153,0.25)" stroke-width="0.8"/>
      <text x="64" y="15" font-family="system-ui,sans-serif" font-size="9" fill="rgba(143,210,153,0.7)" text-anchor="middle">Asana</text>
