<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bgva" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111C1A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1D2E2B;stop-opacity:1"/>
    </linearGradient>
    <filter id="glowva"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="600" fill="url(#bgva)" rx="24"/>
  <g opacity="0.04" stroke="#8FD299" stroke-width="0.5">
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/><line x1="600" y1="0" x2="600" y2="600"/>
  </g>
  <circle cx="680" cy="100" r="200" fill="#8FD299" opacity="0.025"/>
  <rect x="280" y="40" width="240" height="40" rx="20" fill="rgba(143,210,153,0.15)" stroke="rgba(143,210,153,0.3)" stroke-width="1"/>
  <text x="400" y="66" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#8FD299" text-anchor="middle" letter-spacing="1.5">VIRTUAL ASSISTANTS</text>
  <!-- VA multi-task icon -->
  <g transform="translate(400,240)" filter="url(#glowva)">
    <!-- Central hub - person -->
    <circle cx="0" cy="-10" r="40" fill="rgba(143,210,153,0.06)" stroke="rgba(143,210,153,0.25)" stroke-width="1.5"/>
    <circle cx="0" cy="-20" r="14" fill="none" stroke="#8FD299" stroke-width="1.5"/>
    <path d="M-20,5 Q-20,18 0,18 Q20,18 20,5" fill="none" stroke="#8FD299" stroke-width="1.5"/>
    <!-- Orbiting task icons -->
    <!-- Email -->
    <g transform="translate(-95,-55)">
      <circle cx="0" cy="0" r="26" fill="rgba(143,210,153,0.06)" stroke="rgba(143,210,153,0.2)" stroke-width="1"/>
      <rect x="-14" y="-8" width="28" height="18" rx="3" fill="none" stroke="#8FD299" stroke-width="1.2"/>
      <polyline points="-14,-8 0,2 14,-8" fill="none" stroke="#8FD299" stroke-width="1.2"/>
      <line x1="-50" y1="20" x2="-30" y2="10" stroke="rgba(143,210,153,0.15)" stroke-width="1" stroke-dasharray="3,3"/>
    </g>
    <!-- Calendar -->
    <g transform="translate(95,-55)">
      <circle cx="0" cy="0" r="26" fill="rgba(143,210,153,0.06)" stroke="rgba(143,210,153,0.2)" stroke-width="1"/>
      <rect x="-12" y="-10" width="24" height="20" rx="3" fill="none" stroke="#8FD299" stroke-width="1.2"/>
      <line x1="-12" y1="-4" x2="12" y2="-4" stroke="#8FD299" stroke-width="1"/>
      <line x1="-6" y1="-14" x2="-6" y2="-8" stroke="#8FD299" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="6" y1="-14" x2="6" y2="-8" stroke="#8FD299" stroke-width="1.2" stroke-linecap="round"/>
      <rect x="-6" y="0" width="4" height="3" rx="0.5" fill="rgba(143,210,153,0.5)"/>
      <rect x="2" y="0" width="4" height="3" rx="0.5" fill="rgba(143,210,153,0.3)"/>
      <rect x="-6" y="5" width="4" height="3" rx="0.5" fill="rgba(143,210,153,0.3)"/>
      <line x1="50" y1="20" x2="30" y2="10" stroke="rgba(143,210,153,0.15)" stroke-width="1" stroke-dasharray="3,3"/>
    </g>
    <!-- Data entry -->
    <g transform="translate(-95,50)">
      <circle cx="0" cy="0" r="26" fill="rgba(143,210,153,0.06)" stroke="rgba(143,210,153,0.2)" stroke-width="1"/>
      <rect x="-12" y="-10" width="24" height="20" rx="3" fill="none" stroke="#8FD299" stroke-width="1.2"/>
      <rect x="-8" y="-6" width="16" height="2" rx="1" fill="rgba(143,210,153,0.4)"/>
      <rect x="-8" y="-2" width="12" height="2" rx="1" fill="rgba(143,210,153,0.3)"/>
      <rect x="-8" y="2" width="14" height="2" rx="1" fill="rgba(143,210,153,0.2)"/>
      <rect x="-8" y="6" width="10" height="2" rx="1" fill="rgba(143,210,153,0.15)"/>
      <line x1="-50" y1="-15" x2="-30" y2="-5" stroke="rgba(143,210,153,0.15)" stroke-width="1" stroke-dasharray="3,3"/>
    </g>
