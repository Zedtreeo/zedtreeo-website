<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bgl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111C1A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1D2E2B;stop-opacity:1"/>
    </linearGradient>
    <filter id="glowl"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="600" fill="url(#bgl)" rx="24"/>
  <g opacity="0.04" stroke="#8FD299" stroke-width="0.5">
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/><line x1="600" y1="0" x2="600" y2="600"/>
  </g>
  <circle cx="680" cy="100" r="200" fill="#8FD299" opacity="0.025"/>
  <rect x="320" y="40" width="160" height="40" rx="20" fill="rgba(143,210,153,0.15)" stroke="rgba(143,210,153,0.3)" stroke-width="1"/>
  <text x="400" y="66" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#8FD299" text-anchor="middle" letter-spacing="1.5">LEGAL</text>
  <!-- Scale of justice icon -->
  <g transform="translate(400,240)" filter="url(#glowl)">
    <!-- Center pillar -->
    <rect x="-4" y="-70" width="8" height="140" rx="4" fill="rgba(143,210,153,0.15)" stroke="rgba(143,210,153,0.3)" stroke-width="1"/>
    <!-- Top beam -->
    <rect x="-90" y="-78" width="180" height="8" rx="4" fill="rgba(143,210,153,0.1)" stroke="rgba(143,210,153,0.35)" stroke-width="1.5"/>
    <!-- Base -->
    <rect x="-40" y="68" width="80" height="8" rx="4" fill="rgba(143,210,153,0.15)" stroke="rgba(143,210,153,0.3)" stroke-width="1"/>
    <!-- Left pan -->
    <line x1="-80" y1="-70" x2="-80" y2="-20" stroke="rgba(143,210,153,0.4)" stroke-width="1.5"/>
    <line x1="-60" y1="-70" x2="-55" y2="-20" stroke="rgba(143,210,153,0.3)" stroke-width="1"/>
    <line x1="-100" y1="-70" x2="-105" y2="-20" stroke="rgba(143,210,153,0.3)" stroke-width="1"/>
    <path d="M-115,-20 Q-80,-10 -45,-20" fill="rgba(143,210,153,0.08)" stroke="#8FD299" stroke-width="1.5"/>
    <!-- Document icon in left pan -->
    <rect x="-92" y="-45" width="24" height="28" rx="3" fill="rgba(143,210,153,0.1)" stroke="rgba(143,210,153,0.3)" stroke-width="0.8"/>
    <rect x="-87" y="-38" width="14" height="2" rx="1" fill="rgba(143,210,153,0.3)"/>
    <rect x="-87" y="-33" width="10" height="2" rx="1" fill="rgba(143,210,153,0.2)"/>
    <rect x="-87" y="-28" width="12" height="2" rx="1" fill="rgba(143,210,153,0.2)"/>
    <!-- Right pan -->
    <line x1="80" y1="-70" x2="80" y2="-30" stroke="rgba(143,210,153,0.4)" stroke-width="1.5"/>
    <line x1="60" y1="-70" x2="55" y2="-30" stroke="rgba(143,210,153,0.3)" stroke-width="1"/>
    <line x1="100" y1="-70" x2="105" y2="-30" stroke="rgba(143,210,153,0.3)" stroke-width="1"/>
    <path d="M45,-30 Q80,-20 115,-30" fill="rgba(143,210,153,0.08)" stroke="#8FD299" stroke-width="1.5"/>
    <!-- Gavel icon in right pan -->
    <rect x="68" y="-58" width="24" height="8" rx="4" fill="rgba(143,210,153,0.2)" stroke="rgba(143,210,153,0.4)" stroke-width="0.8" transform="rotate(-30 80 -54)"/>
    <rect x="76" y="-56" width="8" height="18" rx="2" fill="rgba(143,210,153,0.15)" stroke="rgba(143,210,153,0.3)" stroke-width="0.8"/>
    <!-- Tool badges -->
    <g transform="translate(140,-40)">
      <rect x="0" y="0" width="62" height="22" rx="11" fill="rgba(143,210,153,0.12)" stroke="rgba(143,210,153,0.25)" stroke-width="0.8"/>
      <text x="31" y="15" font-family="system-ui,sans-serif" font-size="9" fill="rgba(143,210,153,0.7)" text-anchor="middle">Clio</text>
    </g>
    <g transform="translate(140,-8)">
      <rect x="0" y="0" width="62" height="22" rx="11" fill="rgba(143,210,153,0.12)" stroke="rgba(143,210,153,0.25)" stroke-width="0.8"/>
      <text x="31" y="15" font-family="system-ui,sans-serif" font-size="9" fill="rgba(143,210,153,0.7)" text-anchor="middle">LexisNexis</text>
    </g>
    <g transform="translate(140,24)">
      <rect x="0" y="0" width="62" height="22" rx="11" fill="rgba(143,210,153,0.12)" stroke="rgba(143,210,153,0.25)" stroke-width="0.8"/>
      <text x="31" y="15" font-family="system-ui,sans-serif" font-size="9" fill="rgba(143,210,153,0.7)" text-anchor="middle">DocuSign</text>
    </g>
  </g>
  <text x="400" y="440" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle">Legal Support</text>
  <text x="400" y="475" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="rgba(255,255,255,0.55)" text-anchor="middle">Paralegals, legal research, contract review &amp; admin</text>
  <g opacity="0.15" fill="#8FD299"><circle cx="100" cy="100" r="2"/><circle cx="120" cy="100" r="2"/><circle cx="140" cy="100" r="2"/><circle cx="100" cy="120" r="2"/><circle cx="120" cy="120" r="2"/><circle cx="140" cy="120" r="2"/></g>
</svg>