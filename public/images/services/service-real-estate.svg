<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bgre" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111C1A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1D2E2B;stop-opacity:1"/>
    </linearGradient>
    <filter id="glowre"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="600" fill="url(#bgre)" rx="24"/>
  <g opacity="0.04" stroke="#8FD299" stroke-width="0.5">
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/><line x1="600" y1="0" x2="600" y2="600"/>
  </g>
  <circle cx="680" cy="100" r="200" fill="#8FD299" opacity="0.025"/>
  <rect x="310" y="40" width="180" height="40" rx="20" fill="rgba(143,210,153,0.15)" stroke="rgba(143,210,153,0.3)" stroke-width="1"/>
  <text x="400" y="66" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#8FD299" text-anchor="middle" letter-spacing="1.5">REAL ESTATE</text>
  <!-- House + listings mockup -->
  <g transform="translate(400,240)" filter="url(#glowre)">
    <!-- House icon -->
    <g transform="translate(-70,-20)">
      <path d="M0,-65 L-55,-25 L-55,40 L55,40 L55,-25 Z" fill="rgba(143,210,153,0.05)" stroke="rgba(143,210,153,0.25)" stroke-width="1.5"/>
      <path d="M0,-75 L-65,-30 L-55,-30 L0,-65 L55,-30 L65,-30 Z" fill="rgba(143,210,153,0.08)" stroke="rgba(143,210,153,0.3)" stroke-width="1"/>
      <!-- Door -->
      <rect x="-12" y="5" width="24" height="35" rx="3" fill="rgba(143,210,153,0.1)" stroke="rgba(143,210,153,0.3)" stroke-width="1"/>
      <circle cx="8" cy="24" r="2" fill="#8FD299" opacity="0.5"/>
      <!-- Windows -->
      <rect x="-42" y="-10" width="22" height="18" rx="2" fill="rgba(143,210,153,0.08)" stroke="rgba(143,210,153,0.2)" stroke-width="0.8"/>
      <line x1="-31" y1="-10" x2="-31" y2="8" stroke="rgba(143,210,153,0.15)" stroke-width="0.5"/>
      <line x1="-42" y1="-1" x2="-20" y2="-1" stroke="rgba(143,210,153,0.15)" stroke-width="0.5"/>
      <rect x="20" y="-10" width="22" height="18" rx="2" fill="rgba(143,210,153,0.08)" stroke="rgba(143,210,153,0.2)" stroke-width="0.8"/>
      <line x1="31" y1="-10" x2="31" y2="8" stroke="rgba(143,210,153,0.15)" stroke-width="0.5"/>
      <line x1="20" y1="-1" x2="42" y2="-1" stroke="rgba(143,210,153,0.15)" stroke-width="0.5"/>
    </g>
    <!-- Listing cards panel -->
    <g transform="translate(80,-20)">
      <rect x="0" y="-55" width="100" height="120" rx="8" fill="rgba(143,210,153,0.04)" stroke="rgba(143,210,153,0.2)" stroke-width="1"/>
      <!-- Listing 1 -->
      <rect x="8" y="-47" width="84" height="30" rx="4" fill="rgba(143,210,153,0.06)" stroke="rgba(143,210,153,0.12)" stroke-width="0.6"/>
      <rect x="12" y="-43" width="20" height="14" rx="2" fill="rgba(143,210,153,0.1)"/>
      <rect x="36" y="-43" width="40" height="3" rx="1.5" fill="rgba(143,210,153,0.25)"/>
      <rect x="36" y="-37" width="28" height="2" rx="1" fill="rgba(143,210,153,0.15)"/>
      <text x="36" y="-27" font-family="system-ui,sans-serif" font-size="7" font-weight="700" fill="#8FD299">$450K</text>
      <!-- Listing 2 -->
      <rect x="8" y="-10" width="84" height="30" rx="4" fill="rgba(143,210,153,0.06)" stroke="rgba(143,210,153,0.12)" stroke-width="0.6"/>
      <rect x="12" y="-6" width="20" height="14" rx="2" fill="rgba(143,210,153,0.1)"/>
      <rect x="36" y="-6" width="35" height="3" rx="1.5" fill="rgba(143,210,153,0.25)"/>
      <rect x="36" y="0" width="30" height="2" rx="1" fill="rgba(143,210,153,0.15)"/>
      <text x="36" y="10" font-family="system-ui,sans-serif" font-size="7" font-weight="700" fill="#8FD299">$680K</text>
      <!-- Listing 3 -->
      <rect x="8" y="28" width="84" height="30" rx="4" fill="rgba(143,210,153,0.08)" stroke="rgba(143,210,153,0.15)" stroke-width="0.6"/>
      <rect x="12" y="32" width="20" height="14" rx="2" fill="rgba(143,210,153,0.1)"/>
      <rect x="36" y="32" width="38" height="3" rx="1.5" fill="rgba(143,210,153,0.25)"/>
      <rect x="36" y="38" width="26" height="2" rx="1" fill="rgba(143,210,153,0.15)"/>
      <text x="36" y="48" font-family="system-ui,sans-serif" font-size="7" font-weight="700" fill="#8FD299">$520K</text>
    </g>
    <!-- CRM/tool badges -->
    <g transform="translate(-130,65)">
      <rect x="0" y="0" width="72" height="22" rx="11" fill="rgba(143,210,153,0.12)" stroke="rgba(143,210,153,0.25)" stroke-width="0.8"/>
      <text x="36" y="15" font-family="system-ui,sans-serif" font-size="9" fill="rgba(143,210,153,0.7)" text-anchor="middle">Salesforce</text>
    </g>
    <g transform="translate(-48,65)">
      <rect x="0" y="0" width="58" height="22" rx="11" fill="rgba(143,210,153,0.12)" stroke="rgba(143,210,153,0.25)" stroke-width="0.8"/>
      <text x="29" y="15" font-family="system-ui,sans-serif" font-size="9" fill="rgba(143,210,153,0.7)" text-anchor="middle">Zillow</text>
    </g>
    <g transform="translate(20,65)">
      <rect x="0" y="0" width="52" height="22" rx="11" fill="rgba(143,210,153,0.12)" stroke="rgba(143,210,153,0.25)" stroke-width="0.8"/>
      <text x="26" y="15" font-family="system-ui,sans-serif" font-size="9" fill="rgba(143,210,153,0.7)" text-anchor="middle">MLS</text>
